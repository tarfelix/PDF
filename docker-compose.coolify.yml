services:
  app:
    build: .
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - TEMP_FILE_TTL_MINUTES=${TEMP_FILE_TTL_MINUTES:-60}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-500}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - pdf-temp:/app/tmp
    networks:
      - coolify

volumes:
  pdf-temp:

networks:
  coolify:
    external: true
